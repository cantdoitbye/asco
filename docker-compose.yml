services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3081:80"
    depends_on:
      - backend
    networks:
      - asco-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8000"
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/ooumph_shakti
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-key-change-in-production
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    networks:
      - asco-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ooumph_shakti
    ports:
      - "5481:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ooumph_shakti"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - asco-network

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - asco-network

volumes:
  postgres_data:
  redis_data:

networks:
  asco-network:
    driver: bridge
